<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - NTIGI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        padding: 48px 32px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #263070;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: white;
        font-weight: bold;
      }

      h1 {
        font-size: 28px;
        color: #1e293b;
        margin-bottom: 12px;
        font-weight: 600;
      }

      p {
        font-size: 16px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .button {
        display: inline-block;
        background: #263070;
        color: white;
        padding: 14px 32px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
      }

      .button:hover {
        background: #1c265c;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(38, 48, 112, 0.3);
      }

      .status {
        margin-top: 24px;
        padding: 12px;
        background: #fef3c7;
        border-radius: 8px;
        font-size: 14px;
        color: #92400e;
      }

      @media (max-width: 480px) {
        .container {
          padding: 32px 24px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">N</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. Some features may
        not be available until you're back online.
      </p>
      <button class="button" onclick="window.location.reload()">
        Try Again
      </button>
      <div class="status" id="status">Checking connection...</div>
    </div>

    <script>
      // Check connection status
      function updateStatus() {
        const status = document.getElementById("status");
        if (navigator.onLine) {
          status.textContent =
            '✓ Connection restored! Click "Try Again" to continue.';
          status.style.background = "#d1fae5";
          status.style.color = "#065f46";
        } else {
          status.textContent = "✗ No internet connection detected.";
          status.style.background = "#fef3c7";
          status.style.color = "#92400e";
        }
      }

      // Update status on load
      updateStatus();

      // Listen for connection changes
      window.addEventListener("online", updateStatus);
      window.addEventListener("offline", updateStatus);

      // Auto-reload when connection is restored
      window.addEventListener("online", () => {
        setTimeout(() => {
          window.location.reload();
        }, 2000);
      });
    </script>
  </body>
</html>
